<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRIFFERI — Каталог</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--accent:#6c5ce7;--accent-glow:rgba(108,92,231,0.4);--text-primary:#1a1a2e;--text-secondary:#8E8E93;--glass-bg:rgba(255,255,255,0.65);--glass-border:rgba(255,255,255,0.4)}
body{font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(135deg,#e8f4f8 0%,#f0e6f6 40%,#fce4ec 100%);min-height:100vh;color:var(--text-primary);overflow-x:hidden;padding-bottom:110px}
.phone{max-width:390px;margin:0 auto;min-height:100vh;position:relative;background:linear-gradient(180deg,#f8f9fc 0%,#f0e6f6 50%,#fce4ec 100%);overflow:hidden}
.bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.8) 0%,rgba(168,190,255,0.3) 40%,rgba(108,92,231,0.15) 70%,transparent 100%);animation:drift 10s ease-in-out infinite}
.bubble:nth-child(1){width:90px;height:90px;top:100px;left:-30px}
.bubble:nth-child(2){width:110px;height:110px;top:60px;right:-35px;animation-delay:-2s}
.bubble:nth-child(3){width:65px;height:65px;top:280px;right:-15px;animation-delay:-4s}
@keyframes drift{0%,100%{transform:translateY(0)}33%{transform:translateY(-18px)}66%{transform:translateY(10px)}}
.content{position:relative;z-index:1;padding:16px 18px}
.page-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:16px}
.search{width:100%;padding:14px 16px;border:1px solid rgba(255,255,255,0.5);border-radius:18px;background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);font-size:15px;outline:none;margin-bottom:20px}
.filters{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-bottom:24px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{padding:9px 18px;border-radius:22px;background:rgba(255,255,255,0.35);font-size:13px;font-weight:500;color:var(--text-secondary);white-space:nowrap;cursor:pointer;transition:all 0.25s ease;border:none}
.chip.active{background:var(--accent);color:white;box-shadow:0 4px 14px rgba(108,92,231,0.35)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.5);border-radius:22px;padding:14px;cursor:pointer;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);animation:fadeUp 0.6s ease-out both}
.card:nth-child(1){animation-delay:0.1s}.card:nth-child(2){animation-delay:0.2s}.card:nth-child(3){animation-delay:0.3s}.card:nth-child(4){animation-delay:0.4s}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-6px);box-shadow:0 12px 30px rgba(108,92,231,0.12);background:rgba(255,255,255,0.6)}
.card:active{transform:scale(0.96)}
.card-img{width:100%;height:130px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.card-img img{max-width:90%;max-height:100%;object-fit:contain;transition:transform 0.3s ease}
.card:hover .card-img img{transform:scale(1.08)}
.card-name{font-size:14px;font-weight:600;margin-bottom:4px;letter-spacing:0.3px}
.card-sub{font-size:11px;color:var(--text-secondary);margin-bottom:8px}
.card-price{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--accent)}
.floating-nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;width:calc(100% - 40px);max-width:350px;height:68px;background:var(--glass-bg);backdrop-filter:blur(24px);border-radius:34px;border:1px solid var(--glass-border);box-shadow:0 8px 32px rgba(0,0,0,0.08),0 2px 8px rgba(108,92,231,0.06),inset 0 1px 0 rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:space-around;padding:0 8px;animation:navIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both}
@keyframes navIn{from{opacity:0;transform:translateX(-50%) translateY(30px) scale(0.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
.nav-btn{width:52px;height:52px;border:none;background:transparent;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.35s cubic-bezier(0.25,0.46,0.45,0.94)}
.nav-btn:hover{background:rgba(108,92,231,0.06)}
.nav-btn:active{transform:scale(0.88)}
.nav-btn svg{width:24px;height:24px;stroke:var(--text-secondary);fill:none;stroke-width:1.8;transition:all 0.35s ease}
.nav-btn.active{background:linear-gradient(135deg,var(--accent),#a855f7);box-shadow:0 4px 16px var(--accent-glow),0 0 0 4px rgba(108,92,231,0.12)}
.nav-btn.active svg{stroke:white}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-16px);background:rgba(26,26,46,0.88);backdrop-filter:blur(10px);color:white;padding:12px 22px;border-radius:14px;font-size:13px;font-weight:500;z-index:300;opacity:0;transition:all 0.4s;pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="phone">
<div class="bubbles"><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div></div>
<div class="content">
<h1 class="page-title">Каталог</h1>
<input class="search" type="text" placeholder="Найти товар...">
<div class="filters">
<button class="chip active" onclick="setFilter(this)">Все</button>
<button class="chip" onclick="setFilter(this)">Сумки</button>
<button class="chip" onclick="setFilter(this)">Кроссовки</button>
<button class="chip" onclick="setFilter(this)">Очки</button>
<button class="chip" onclick="setFilter(this)">Аксессуары</button>
</div>
<div class="grid">
<div class="card" onclick="toast('LUNA Сумка — 12 990 ₽')"><div class="card-img"><img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=300&h=300&fit=crop" alt="LUNA" onerror="this.outerHTML='<span style=font-size:48px>👜</span>'"></div><div class="card-name">LUNA</div><div class="card-sub">Сумка</div><div class="card-price">12 990 ₽</div></div>
<div class="card" onclick="toast('AURORA Кроссовки — 7 450 ₽')"><div class="card-img"><img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=300&h=300&fit=crop" alt="AURORA" onerror="this.outerHTML='<span style=font-size:48px>👟</span>'"></div><div class="card-name">AURORA</div><div class="card-sub">Кроссовки</div><div class="card-price">7 450 ₽</div></div>
<div class="card" onclick="toast('SKY Очки — 4 100 ₽')"><div class="card-img"><img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=300&h=300&fit=crop" alt="SKY" onerror="this.outerHTML='<span style=font-size:48px>🕶️</span>'"></div><div class="card-name">SKY</div><div class="card-sub">Очки</div><div class="card-price">4 100 ₽</div></div>
<div class="card" onclick="toast('SILK Шарф — 3 200 ₽')"><div class="card-img"><img src="https://images.unsplash.com/photo-1584030373081-f37b7bb4fa33?w=300&h=300&fit=crop" alt="SILK" onerror="this.outerHTML='<span style=font-size:48px>🧣</span>'"></div><div class="card-name">SILK</div><div class="card-sub">Шарф</div><div class="card-price">3 200 ₽</div></div>
<div class="card" onclick="toast('NOVA Часы — 15 800 ₽')"><div class="card-img"><img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=300&h=300&fit=crop" alt="NOVA" onerror="this.outerHTML='<span style=font-size:48px>⌚</span>'"></div><div class="card-name">NOVA</div><div class="card-sub">Часы</div><div class="card-price">15 800 ₽</div></div>
<div class="card" onclick="toast('MARS Рюкзак — 9 900 ₽')"><div class="card-img"><img src="https://images.unsplash.com/photo-1591561954557-26941169b49e?w=300&h=300&fit=crop" alt="MARS" onerror="this.outerHTML='<span style=font-size:48px>🎒</span>'"></div><div class="card-name">MARS</div><div class="card-sub">Рюкзак</div><div class="card-price">9 900 ₽</div></div>
</div>
</div>
<nav class="floating-nav">
<button class="nav-btn" onclick="navigateTo('')"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></button>
<button class="nav-btn active" onclick="navigateTo('catalog')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg></button>
<button class="nav-btn" onclick="setActive(this,'Избранное')"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></button>
<button class="nav-btn" onclick="setActive(this,'Корзина')"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></button>
<button class="nav-btn" onclick="setActive(this,'Профиль')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
</nav>
</div>
<div class="toast" id="toast"></div>
<script>
function getBaseUrl(){const u=window.location.href;return u.split('?')[0].replace(/\/$/,'')}
function navigateTo(page){const tg=window.Telegram?.WebApp;if(tg&&tg.openLink){const fullUrl=getBaseUrl()+(page?'/'+page:'');tg.openLink(fullUrl,{try_instant_view:true})}else{window.location.href=getBaseUrl()+(page?'/'+page:'')}}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');if(window.Telegram?.WebApp?.HapticFeedback){window.Telegram.WebApp.HapticFeedback.impactOccurred('light')}setTimeout(()=>t.classList.remove('show'),1800)}
function setFilter(el){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');toast('Фильтр: '+el.textContent)}
function setActive(el,name){document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));el.classList.add('active');toast(name)}
document.addEventListener('DOMContentLoaded',()=>{if(window.Telegram?.WebApp){const tg=window.Telegram.WebApp;tg.ready();tg.expand();tg.setHeaderColor('#f0e6f6');tg.setBackgroundColor('#f0e6f6')}});
</script>
</body>
</html>
