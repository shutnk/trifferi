<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TRIFFERI — Каталог</title><script src="https://telegram.org/js/telegram-web-app.js"></script><style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#6c5ce7;--text:#1a1a2e;--muted:#8E8E93;--glass:rgba(255,255,255,0.65)}
body{font-family:Inter,sans-serif;background:linear-gradient(135deg,#e8f4f8,#f0e6f6,#fce4ec);min-height:100vh;color:var(--text);padding-bottom:90px}
.phone{max-width:390px;margin:0 auto;position:relative;overflow:hidden}
.bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.8),rgba(168,190,255,0.3),transparent 70%);animation:drift 10s infinite}
@keyframes drift{0%,100%{transform:translateY(0)}33%{transform:translateY(-15px)}66%{transform:translateY(8px)}}
.bubble:nth-child(1){width:90px;height:90px;top:100px;left:-30px}
.bubble:nth-child(2){width:110px;height:110px;top:60px;right:-35px;animation-delay:-2s}
.bubble:nth-child(3){width:65px;height:65px;top:280px;right:-15px;animation-delay:-4s}
.content{position:relative;z-index:1;padding:16px 18px}
.header{margin-bottom:16px}
.title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:12px}
.search{width:100%;padding:14px 16px;border:1px solid rgba(255,255,255,0.5);border-radius:18px;background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);font-size:15px;outline:none}
.filters{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;margin-bottom:20px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{padding:9px 18px;border-radius:22px;background:rgba(255,255,255,0.35);font-size:13px;font-weight:500;color:var(--muted);white-space:nowrap;cursor:pointer}
.chip.active{background:var(--accent);color:white}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.5);border-radius:22px;padding:14px;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(108,92,231,0.12)}
.img{width:100%;height:130px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.img img{max-width:90%;max-height:100%;object-fit:contain}
.name{font-size:14px;font-weight:600;margin-bottom:4px}
.sub{font-size:11px;color:var(--muted);margin-bottom:8px}
.price{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--accent)}
.nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;width:calc(100% - 40px);max-width:350px;height:68px;background:var(--glass);backdrop-filter:blur(24px);border-radius:34px;border:1px solid rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:space-around;padding:0 8px}
.nav-btn{width:52px;height:52px;border:none;background:transparent;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.nav-btn svg{width:24px;height:24px;stroke:var(--muted);fill:none;stroke-width:1.8}
.nav-btn.active{background:linear-gradient(135deg,var(--accent),#a855f7)}
.nav-btn.active svg{stroke:white}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-16px);background:rgba(26,26,46,0.88);color:white;padding:12px 22px;border-radius:14px;font-size:13px;z-index:300;opacity:0;transition:all 0.4s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head><body>
<div class="phone"><div class="bubbles"><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div></div>
<div class="content">
<div class="header"><h1 class="title">Каталог</h1><input class="search" placeholder="Найти товар..."></div>
<div class="filters">
<div class="chip active" onclick="setF(this)">Все</div><div class="chip" onclick="setF(this)">Сумки</div><div class="chip" onclick="setF(this)">Кроссовки</div><div class="chip" onclick="setF(this)">Очки</div><div class="chip" onclick="setF(this)">Аксессуары</div>
</div>
<div class="grid">
<div class="card" onclick="t('LUNA — 12 990 ₽')"><div class="img"><img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=300" onerror="this.outerHTML='👜'"></div><div class="name">LUNA</div><div class="sub">Сумка</div><div class="price">12 990 ₽</div></div>
<div class="card" onclick="t('AURORA — 7 450 ₽')"><div class="img"><img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=300" onerror="this.outerHTML='👟'"></div><div class="name">AURORA</div><div class="sub">Кроссовки</div><div class="price">7 450 ₽</div></div>
<div class="card" onclick="t('SKY — 4 100 ₽')"><div class="img"><img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=300" onerror="this.outerHTML='🕶️'"></div><div class="name">SKY</div><div class="sub">Очки</div><div class="price">4 100 ₽</div></div>
<div class="card" onclick="t('SILK — 3 200 ₽')"><div class="img"><img src="https://images.unsplash.com/photo-1584030373081-f37b7bb4fa33?w=300" onerror="this.outerHTML='🧣'"></div><div class="name">SILK</div><div class="sub">Шарф</div><div class="price">3 200 ₽</div></div>
<div class="card" onclick="t('NOVA — 15 800 ₽')"><div class="img"><img src="https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=300" onerror="this.outerHTML='⌚'"></div><div class="name">NOVA</div><div class="sub">Часы</div><div class="price">15 800 ₽</div></div>
<div class="card" onclick="t('MARS — 9 900 ₽')"><div class="img"><img src="https://images.unsplash.com/photo-1591561954557-26941169b49e?w=300" onerror="this.outerHTML='🎒'"></div><div class="name">MARS</div><div class="sub">Рюкзак</div><div class="price">9 900 ₽</div></div>
</div></div>
<nav class="nav">
<a href="/" class="nav-btn"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></a>
<a href="/catalog" class="nav-btn active"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg></a>
<button class="nav-btn" onclick="t('Избранное')"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78"/></svg></button>
<button class="nav-btn" onclick="t('Корзина')"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/></svg></button>
<button class="nav-btn" onclick="t('Профиль')"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
</nav></div>
<div class="toast" id="toast"></div>
<script>
function t(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800)}
function setF(el){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');t('Фильтр: '+el.textContent)}
document.addEventListener('DOMContentLoaded',()=>{if(window.Telegram?.WebApp){const tg=window.Telegram.WebApp;tg.ready();tg.expand();tg.setHeaderColor('#f0e6f6');tg.setBackgroundColor('#f0e6f6')}});
</script></body></html>
