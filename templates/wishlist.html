<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>TRIFFERI — Избранное</title><script src="https://telegram.org/js/telegram-web-app.js"></script><style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--accent:#6c5ce7;--text:#1a1a2e;--muted:#8E8E93;--glass:rgba(255,255,255,0.65);--red:#ff3b30}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#e8f4f8,#f0e6f6,#fce4ec);min-height:100vh;color:var(--text);overflow-x:hidden;padding-bottom:100px}
.phone{max-width:390px;margin:0 auto;position:relative}
.bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.8),rgba(168,190,255,0.3),transparent 70%);animation:drift 10s infinite}
@keyframes drift{0%,100%{transform:translateY(0)}33%{transform:translateY(-15px)}66%{transform:translateY(8px)}}
.bubble:nth-child(1){width:90px;height:90px;top:100px;left:-30px}
.bubble:nth-child(2){width:110px;height:110px;top:60px;right:-35px;animation-delay:-2s}
.bubble:nth-child(3){width:65px;height:65px;top:280px;right:-15px;animation-delay:-4s}
.content{position:relative;z-index:1;padding:16px 18px}
.page-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-bottom:20px}
.empty-state{text-align:center;padding:60px 20px;animation:fadeUp 0.6s}
.empty-icon{font-size:64px;margin-bottom:16px;opacity:0.6}
.empty-title{font-size:18px;font-weight:600;margin-bottom:8px}
.empty-text{font-size:14px;color:var(--muted);margin-bottom:24px}
.empty-btn{display:inline-block;padding:12px 28px;background:var(--accent);color:white;border-radius:14px;font-size:14px;font-weight:500;text-decoration:none;transition:transform 0.2s}
.empty-btn:active{transform:scale(0.95)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.wishlist-item{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.5);border-radius:22px;padding:14px;margin-bottom:12px;animation:fadeUp 0.6s both}
.wishlist-item:nth-child(1){animation-delay:0.1s}.wishlist-item:nth-child(2){animation-delay:0.15s}.wishlist-item:nth-child(3){animation-delay:0.2s}.wishlist-item:nth-child(4){animation-delay:0.25s}
.item-img{width:80px;height:80px;border-radius:16px;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,0.6)}
.item-img img{width:100%;height:100%;object-fit:cover}
.item-info{flex:1;min-width:0}
.item-name{font-size:14px;font-weight:600;margin-bottom:4px}
.item-sub{font-size:12px;color:var(--muted);margin-bottom:6px}
.item-price{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--accent)}
.item-actions{display:flex;flex-direction:column;align-items:center;gap:8px}
.btn-remove{width:36px;height:36px;border:none;background:rgba(255,59,48,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.btn-remove:active{transform:scale(0.9);background:rgba(255,59,48,0.2)}
.btn-remove svg{width:18px;height:18px;stroke:var(--red);fill:none;stroke-width:2}
.btn-cart{width:36px;height:36px;border:none;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s}
.btn-cart:active{transform:scale(0.9)}
.btn-cart svg{width:18px;height:18px;stroke:white;fill:none;stroke-width:2}
.nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;width:calc(100% - 40px);max-width:350px;height:68px;background:var(--glass);backdrop-filter:blur(24px);border-radius:34px;border:1px solid rgba(255,255,255,0.4);box-shadow:0 8px 32px rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:space-around;padding:0 8px}
.nav-btn{width:52px;height:52px;border:none;background:transparent;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s}
.nav-btn svg{width:24px;height:24px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{background:linear-gradient(135deg,var(--accent),#a855f7);box-shadow:0 4px 16px rgba(108,92,231,0.4)}
.nav-btn.active svg{stroke:white}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-16px);background:rgba(26,26,46,0.88);backdrop-filter:blur(10px);color:white;padding:12px 22px;border-radius:14px;font-size:13px;z-index:300;opacity:0;transition:all 0.4s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.count-badge{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;background:var(--accent);color:white;border-radius:12px;font-size:12px;font-weight:600;margin-left:8px}
</style></head><body><div class="phone"><div class="bubbles"><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div></div><div class="content">
<h1 class="page-title">Избранное <span class="count-badge" id="count">3</span></h1>
<div id="filled">
<div class="wishlist-item" data-id="1"><div class="item-img"><img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=200&h=200&fit=crop" alt="LUNA"></div><div class="item-info"><div class="item-name">LUNA</div><div class="item-sub">Сумка</div><div class="item-price">12 990 ₽</div></div><div class="item-actions"><button class="btn-remove" onclick="removeItem(1)"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></button><button class="btn-cart" onclick="addToCart(1)"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></button></div></div>
<div class="wishlist-item" data-id="2"><div class="item-img"><img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=200&h=200&fit=crop" alt="AURORA"></div><div class="item-info"><div class="item-name">AURORA</div><div class="item-sub">Кроссовки</div><div class="item-price">7 450 ₽</div></div><div class="item-actions"><button class="btn-remove" onclick="removeItem(2)"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></button><button class="btn-cart" onclick="addToCart(2)"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></button></div></div>
<div class="wishlist-item" data-id="3"><div class="item-img"><img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=200&h=200&fit=crop" alt="SKY"></div><div class="item-info"><div class="item-name">SKY</div><div class="item-sub">Очки</div><div class="item-price">4 100 ₽</div></div><div class="item-actions"><button class="btn-remove" onclick="removeItem(3)"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></button><button class="btn-cart" onclick="addToCart(3)"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></button></div></div>
</div>
<div id="empty" style="display:none"><div class="empty-state"><div class="empty-icon"></div><div class="empty-title">Пока пусто</div><div class="empty-text">Добавляйте товары в избранное,<br>нажимая на сердечко ❤️</div><a href="javascript:goToCatalog()" class="empty-btn">Перейти в каталог</a></div></div>
</div>
<nav class="nav">
<button class="nav-btn" onclick="goToHome()"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></button>
<button class="nav-btn" onclick="goToCatalog()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg></button>
<button class="nav-btn active" onclick="setActive(this)"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></button>
<button class="nav-btn" onclick="setActive(this)"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></button>
<button class="nav-btn" onclick="setActive(this)"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
</nav></div><div class="toast" id="toast"></div>
<script>
function goToHome(){window.location.href=window.location.origin+'/';}
function goToCatalog(){window.location.href=window.location.origin+'/catalog';}
function removeItem(id){const item=document.querySelector(`[data-id="${id}"]`);if(item){item.style.transition='all 0.3s';item.style.opacity='0';item.style.transform='translateX(50px)';setTimeout(()=>{item.remove();updateCount()},300)}toast('Удалено из избранного');}
function addToCart(id){toast('Добавлено в корзину 🛒')}
function updateCount(){const items=document.querySelectorAll('.wishlist-item').length;document.getElementById('count').textContent=items;if(items===0){document.getElementById('filled').style.display='none';document.getElementById('empty').style.display='block'}}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');if(window.Telegram?.WebApp?.HapticFeedback){window.Telegram.WebApp.HapticFeedback.impactOccurred('light')}setTimeout(()=>t.classList.remove('show'),1800)}
function setActive(el){document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));el.classList.add('active')}
document.addEventListener('DOMContentLoaded',()=>{if(window.Telegram?.WebApp){const tg=window.Telegram.WebApp;tg.ready();tg.expand();tg.setHeaderColor('#f0e6f6');tg.setBackgroundColor('#f0e6f6')}});
</script></body></html>
