lex;align-items:center;justify-content:center;background:rgba(0,0,0,0.15)}.cat-label{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:white;text-shadow:0 2px 8px rgba(0,0,0,0.4);letter-spacing:1px;text-align:center;line-height:1.3;padding:0 12px}.cat.wide{grid-column:span 2;height:95px}.floating-nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;width:calc(100% - 40px);max-width:350px;height:68px;background:var(--glass-bg);backdrop-filter:blur(24px);border-radius:34px;border:1px solid var(--glass-border);box-shadow:0 8px 32px rgba(0,0,0,0.08),0 2px 8px rgba(108,92,231,0.06),inset 0 1px 0 rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:space-around;padding:0 8px;animation:navIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;animation-delay:0.5s}@keyframes navIn{from{opacity:0;transform:translateX(-50%) translateY(30px) scale(0.9)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}.nav-btn{width:52px;height:52px;border:none;background:transparent;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all 0.35s cubic-bezier(0.25,0.46,0.45,0.94)}.nav-btn:hover{background:rgba(108,92,231,0.06)}.nav-btn:active{transform:scale(0.88)}.nav-btn svg{width:24px;height:24px;stroke:var(--text-secondary);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:all 0.35s ease;position:relative;z-index:2}.nav-btn.active{background:linear-gradient(135deg,var(--accent),#a855f7);box-shadow:0 4px 16px var(--accent-glow),0 0 0 4px rgba(108,92,231,0.12)}.nav-btn.active svg{stroke:white;stroke-width:2}.nav-btn .badge{position:absolute;top:2px;right:2px;min-width:18px;height:18px;background:var(--badge-red);border-radius:9px;font-size:10px;font-weight:700;color:white;display:flex;align-items:center;justify-content:center;padding:0 4px;z-index:3;border:2px solid rgba(255,255,255,0.8);box-shadow:0 2px 6px rgba(255,59,48,0.4);an
