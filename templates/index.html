<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRIFFERI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--accent:#6c5ce7;--accent-glow:rgba(108,92,231,0.4);--text-primary:#1a1a2e;--text-secondary:#8E8E93;--glass-bg:rgba(255,255,255,0.65)}
body{font-family:'Inter',-apple-system,sans-serif;background:linear-gradient(135deg,#e8f4f8 0%,#f0e6f6 40%,#fce4ec 100%);min-height:100vh;color:var(--text-primary);overflow-x:hidden}
.phone{max-width:390px;margin:0 auto;min-height:100vh;position:relative;background:linear-gradient(180deg,#f8f9fc 0%,#f0e6f6 50%,#fce4ec 100%);overflow:hidden}
.bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bubble{position:absolute;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.8) 0%,rgba(168,190,255,0.3) 40%,rgba(108,92,231,0.15) 70%,transparent 100%);animation:drift 10s ease-in-out infinite}
.bubble:nth-child(1){width:90px;height:90px;top:100px;left:-30px}
.bubble:nth-child(2){width:110px;height:110px;top:60px;right:-35px;animation-delay:-2s}
.bubble:nth-child(3){width:65px;height:65px;top:280px;right:-15px;animation-delay:-4s}
@keyframes drift{0%,100%{transform:translateY(0)}33%{transform:translateY(-18px)}66%{transform:translateY(10px)}}
.content{position:relative;z-index:1;padding-bottom:110px;overflow-y:auto;min-height:100vh}
.hero{margin:16px 18px 20px;border-radius:24px;overflow:hidden;position:relative;height:300px;cursor:pointer;transition:transform 0.3s}
.hero:active{transform:scale(0.98)}
.hero img{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(0,0,0,0.35) 100%);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 24px 28px}
.hero-title{font-family:'Playfair Display',serif;font-size:34px;font-weight:500;color:white;text-shadow:0 2px 12px rgba(0,0,0,0.3);margin-bottom:14px;letter-spacing:1px}
.hero-btn{padding:11px 32px;border:1px solid rgba(255,255,255,0.35);border-radius:50px;background:rgba(255,255,255,0.18);backdrop-filter:blur(8px);color:white;font-size:14px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.3s ease}
.hero-btn:hover{background:rgba(255,255,255,0.3)}
.section-head{display:flex;justify-content:space-between;align-items:center;padding:0 20px 12px}
.section-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600}
.products{display:flex;gap:12px;padding:0 18px 24px;overflow-x:auto;scrollbar-width:none}
.products::-webkit-scrollbar{display:none}
.prod{min-width:148px;background:rgba(255,255,255,0.4);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.45);border-radius:20px;padding:14px 12px;cursor:pointer}
.prod-img{width:100%;height:95px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.prod-img img{max-width:85%;max-height:90%;object-fit:contain}
.prod-name{font-size:13px;font-weight:600;margin-bottom:1px}
.prod-sub{font-size:11px;color:var(--text-secondary);margin-bottom:6px}
.prod-price{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--accent)}
.cats{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 18px 24px}
.cat{height:115px;border-radius:20px;overflow:hidden;position:relative;cursor:pointer}
.cat-bg{width:100%;height:100%;object-fit:cover;filter:blur(2px) brightness(0.65)}
.cat-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.15)}
.cat-label{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:white;text-shadow:0 2px 8px rgba(0,0,0,0.4);letter-spacing:1px;text-align:center;padding:0 12px}
.cat.wide{grid-column:span 2;height:95px}
.floating-nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:100;width:calc(100% - 40px);max-width:350px;height:68px;background:var(--glass-bg);backdrop-filter:blur(24px);border-radius:34px;border:1px solid rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:space-around;padding:0 8px}
.nav-btn{width:52px;height:52px;border:none;background:transparent;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.nav-btn svg{width:24px;height:24px;stroke:var(--text-secondary);fill:none;stroke-width:1.8}
.nav-btn.active{background:linear-gradient(135deg,var(--accent),#a855f7)}.nav-btn.active svg{stroke:white}
</style>
</head>
<body>
<div class="phone">
<div class="bubbles"><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div></div>
<div class="content">
<div class="hero" onclick="navigateTo('catalog')">
<img src="https://images.unsplash.com/photo-1509631179647-0177331693ae?w=800&h=600&fit=crop" alt="Collection">
<div class="hero-overlay">
<h1 class="hero-title">Весенний Блеск</h1>
<button class="hero-btn" onclick="event.stopPropagation();navigateTo('catalog')">ОТКРЫТЬ</button>
</div>
</div>
<div class="section-head"><h2 class="section-title">Новинки</h2></div>
<div class="products">
<div class="prod"><div class="prod-img"><img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=200" alt="LUNA"></div><div class="prod-name">LUNA</div><div class="prod-sub">Сумка</div><div class="prod-price">12 990 ₽</div></div>
<div class="prod"><div class="prod-img"><img src="https://images.unsplash.com/photo-1549298916-b41d501d3772?w=200" alt="AURORA"></div><div class="prod-name">AURORA</div><div class="prod-sub">Кроссовки</div><div class="prod-price">7 450 ₽</div></div>
<div class="prod"><div class="prod-img"><img src="https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=200" alt="SKY"></div><div class="prod-name">SKY</div><div class="prod-sub">Очки</div><div class="prod-price">4 100 ₽</div></div>
</div>
<div class="section-head"><h2 class="section-title">Категории</h2></div>
<div class="cats">
<div class="cat"><img class="cat-bg" src="https://images.unsplash.com/photo-1544022613-e87ca75a784a?w=400&h=300&fit=crop" alt="Tailoring"><div class="cat-overlay"><span class="cat-label">ПАЛЬТО И ТРЕНЧИ</span></div></div>
<div class="cat"><img class="cat-bg" src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=400&h=300&fit=crop" alt="Casual"><div class="cat-overlay"><span class="cat-label">КАЖУАЛ</span></div></div>
<div class="cat wide"><img class="cat-bg" src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?w=800&h=300&fit=crop" alt="Summer"><div class="cat-overlay"><span class="cat-label">ЛЕТНИЕ ESSENTIALS</span></div></div>
<div class="cat wide"><img class="cat-bg" src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=800&h=300&fit=crop" alt="Best"><div class="cat-overlay"><span class="cat-label">ХИТЫ ПРОДАЖ</span></div></div>
</div>
</div>
<nav class="floating-nav">
<button class="nav-btn active" onclick="setActive(this)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg></button>
<button class="nav-btn" onclick="navigateTo('catalog')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg></button>
<button class="nav-btn" onclick="setActive(this)"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></button>
<button class="nav-btn" onclick="setActive(this)"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/></svg></button>
<button class="nav-btn" onclick="setActive(this)"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></button>
</nav>
</div>
<script>
function navigateTo(page){
  const currentUrl = window.location.href;
  const baseUrl = currentUrl.split('?')[0];
  const newUrl = baseUrl.replace(/\/$/, '') + '/' + page;
  window.location.href = newUrl;
}
function setActive(el){
  document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
}
document.addEventListener('DOMContentLoaded',()=>{
  if(window.Telegram && window.Telegram.WebApp){
    const tg=window.Telegram.WebApp;    tg.ready();
    tg.expand();
    tg.setHeaderColor('#f8f9fc');
    tg.setBackgroundColor('#f0e6f6');
  }
});
</script>
</body>
</html>
