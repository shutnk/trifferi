<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TRIFFERI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}:root{--bg:#030308;--b:#1a56db;--b2:#4d8bf5}
body{font-family:Inter,sans-serif;background:var(--bg);color:#f8f8ff;padding-top:66px;overflow-x:hidden}
#p{position:fixed;inset:0;z-index:0;pointer-events:none}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;background:rgba(3,3,8,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06)}
.nl{display:flex;align-items:center;gap:8px;cursor:pointer}.av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--b),var(--b2));display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;overflow:hidden}.av img{width:100%;height:100%;object-fit:cover}.nn{font-size:12px;font-weight:700}.nh{font-size:9px;color:rgba(255,255,255,.4)}
.nc{display:flex;gap:2px;background:rgba(255,255,255,.04);border-radius:10px;padding:2px;border:1px solid rgba(255,255,255,.06)}.nlk{width:32px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer}.nlk.active{background:rgba(26,86,219,.15)}.nlk svg{width:16px;height:16px;stroke:rgba(255,255,255,.45);fill:none;stroke-width:1.5}.nlk.active svg{stroke:var(--b2)}
.nr{display:flex;gap:4px}.nic{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}.nic svg{width:16px;height:16px;stroke:rgba(255,255,255,.6);fill:none;stroke-width:1.5}.bd{position:absolute;top:-2px;right:-2px;width:6px;height:6px;border-radius:50%;background:var(--b2)}
.pg{display:none;min-height:calc(100vh - 66px)}.pg.active{display:block}
.hero{padding:50px 16px 30px;text-align:center}.ver{color:var(--b2);margin-bottom:8px;font-weight:700}.ht{font-size:clamp(32px,9vw,64px);font-weight:900;line-height:.95;margin-bottom:12px}.ht span{color:var(--b2)}.hs{font-size:14px;color:rgba(255,255,255,.4);margin:0 auto 24px}
.btn{padding:12px 26px;border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .3s}.b1{background:linear-gradient(135deg,var(--b),var(--b2));color:#fff;box-shadow:0 4px 15px rgba(26,86,219,.3)}.b1:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(26,86,219,.5)}.b2{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.15)}.b2:hover{background:rgba(255,255,255,.1)}
.marquee{margin:20px 0;overflow:hidden;border-radius:16px;background:rgba(26,86,219,.1)}.track{display:flex;white-space:nowrap;animation:run 12s linear infinite}.track span{padding:12px 40px;font-size:13px;font-weight:600;color:var(--b2)}@keyframes run{to{transform:translateX(-50%)}}
.sec{padding:30px 14px}.sh{display:flex;justify-content:space-between;margin-bottom:14px}.sl{font-size:9px;color:var(--b2)}.st{font-size:22px;font-weight:800}
.ps{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px}.pc{min-width:220px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);position:relative;transition:transform .3s}.pc:hover{transform:translateY(-4px)}.pi{height:180px;display:flex;align-items:center;justify-content:center;font-size:50px}.pb{padding:12px}.pn{font-size:16px;font-weight:700}.ppr{font-size:16px;font-weight:800}
.ph{padding:14px 16px;display:flex;align-items:center;gap:10px}.pbk{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;cursor:pointer}.pt2{font-size:20px;font-weight:800}
.cag{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 14px}.cac{border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);position:relative;transition:transform .3s}.cac:hover{transform:translateY(-4px)}.cai{height:140px;display:flex;align-items:center;justify-content:center;font-size:44px}.can{font-size:13px;font-weight:700}.cap{font-size:14px;font-weight:800}
.ce{text-align:center;padding:50px 16px;color:rgba(255,255,255,.5)}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(100px);padding:12px 24px;border-radius:100px;background:rgba(26,86,219,.9);color:#fff;font-size:13px;font-weight:600;z-index:1000;opacity:0;transition:all .3s;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head><body><canvas id="p"></canvas>
<nav class="nav"><div class="nl" onclick="tm()"><div class="av" id="nAv">N</div><div><div class="nn" id="nNm">Загрузка...</div><div class="nh" id="nHdl">@user</div></div></div><div class="nc"><div class="nlk active" id="lk0" onclick="go(0)"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><div class="nlk" id="lk1" onclick="go(1)"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div><div class="nlk" id="lk2" onclick="go(2);renderWish()"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div></div><div class="nr"><div class="nic" onclick="go(3)" style="position:relative"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg><div class="bd" id="bdg" style="display:none"></div></div></div></nav>

<div class="pg active" id="pg0"><section class="hero"><div class="ver">v.1</div><h1 class="ht">Весенний <span>Блеск</span></h1><p class="hs">Откройте мир стиля и элегантности.</p><div style="display:flex;gap:8px;justify-content:center"><button class="btn b1" onclick="go(1)">Каталог →</button></div></section><div class="marquee"><div class="track"><span>TRIFFERI • ВЕСЕННИЙ БЛЕСК • 2026 • </span><span>TRIFFERI • ВЕСЕННИЙ БЛЕСК • 2026 • </span></div></div><section class="sec"><div class="sh"><div><div class="sl">Коллекция</div><div class="st">Новинки</div></div></div><div class="ps" id="pS"></div></section><section class="sec"><div class="sl">Категории</div><div class="st" style="margin-bottom:12px">Навигация</div><div class="cag"><div class="cac" onclick="go(1)"><div class="cai">👜</div><div class="can">Сумки</div></div><div class="cac" onclick="go(1)"><div class="cai">👟</div><div class="can">Обувь</div></div><div class="cac" onclick="go(1)"><div class="cai">🕶</div><div class="can">Аксессуары</div></div><div class="cac" onclick="go(1)"><div class="cai">👗</div><div class="can">Одежда</div></div></div></section></div>

<div class="pg" id="pg1"><div class="ph"><div class="pbk" onclick="go(0)">←</div><h1 class="pt2">Каталог</h1></div><div class="cag" id="cG"></div></div>

<div class="pg" id="pg2"><div class="ph"><div class="pbk" onclick="go(0)">←</div><h1 class="pt2">Избранное</h1></div><div id="wishList" style="padding:0 14px"></div></div>

<div class="pg" id="pg3"><div class="ph"><div class="pbk" onclick="go(0)">←</div><h1 class="pt2">Корзина</h1></div><div id="cC"></div></div>
<div class="toast" id="toast"></div>
<script>
// Particles
const cv=document.getElementById('p'),cx=cv.getContext('2d');let W,H;
function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight}rs();onresize=rs;
const pts=[];for(let i=0;i<40;i++)pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()+.5,dx:(Math.random()-.5)*.3,dy:(Math.random()-.5)*.3,o:Math.random()*.3+.1});
function dr(){cx.clearRect(0,0,W,H);pts.forEach(p=>{p.x+=p.dx;p.y+=p.dy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;cx.beginPath();cx.arc(p.x,p.y,p.r,0,7);cx.fillStyle=`rgba(77,139,245,${p.o})`;cx.fill()});for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<80){cx.beginPath();cx.moveTo(pts[i].x,pts[i].y);cx.lineTo(pts[j].x,pts[j].y);cx.strokeStyle=`rgba(77,139,245,${.06*(1-d/80)})`;cx.lineWidth=.5;cx.stroke()}}requestAnimationFrame(dr)}dr();

// Telegram Profile
function initProfile(){try{const tg=window.Telegram?.WebApp;const n=document.getElementById('nNm');const a=document.getElementById('nAv');const h=document.getElementById('nHdl');if(tg){tg.ready();tg.expand();const u=tg.initDataUnsafe?.user;if(u&&u.first_name){const nm=u.first_name+(u.last_name?' '+u.last_name:'');n.textContent=nm;a.textContent=nm[0];if(u.photo_url)a.innerHTML='<img src="'+u.photo_url+'">';if(u.username)h.textContent='@'+u.username;localStorage.setItem('tp',JSON.stringify({name:nm,username:u.username||'',photo:u.photo_url||''}));}else{n.textContent='Гость';}}else{n.textContent='Гость';}}catch(e){console.error(e);}}
initProfile();

// Data
const P=[{n:'LUNA',c:'Сумка',p:12990,e:'👜'},{n:'AURORA',c:'Кроссовки',p:7450,e:'👟'},{n:'SKY',c:'Очки',p:4100,e:'🕶'},{n:'VELVET',c:'Платье',p:18900,e:'👗'},{n:'NOIR',c:'Часы',p:24500,e:'⌚'},{n:'BLAZE',c:'Куртка',p:15600,e:'🧥'}];
let cart=JSON.parse(localStorage.getItem('cart'))||[];
let wish=JSON.parse(localStorage.getItem('wish'))||[];

// Navigation
function go(id){document.querySelectorAll('.pg').forEach(p=>p.classList.remove('active'));document.getElementById('pg'+id).classList.add('active');for(let i=0;i<3;i++)document.getElementById('lk'+i).classList.toggle('active',i===id);if(id===1)rC();if(id===2)renderWish();if(id===3)rCart();window.scrollTo({top:0});}
function tm(){const s=JSON.parse(localStorage.getItem('tp'))||{};const m=document.getElementById('mNm'),a=document.getElementById('mAv'),h=document.getElementById('mHdl');if(s.name){m.textContent=s.name;a.textContent=s.name[0];if(s.photo)a.innerHTML='<img src="'+s.photo+'">';}if(s.username)h.textContent=s.username;document.getElementById('um').classList.toggle('open');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

// Render Products
function rP(){document.getElementById('pS').innerHTML=P.map(i=>'<div class="pc"><div class="cai" style="height:180px;font-size:50px">'+i.e+'</div><div class="pb"><div class="pn">'+i.n+'</div><div class="ppr">'+i.p.toLocaleString()+' ₽</div></div></div>').join('');}
function rC(){document.getElementById('cG').innerHTML=P.map(i=>'<div class="cac"><div class="cai">'+i.e+'</div><div class="can">'+i.n+'</div><div class="cap">'+i.p.toLocaleString()+' ₽</div></div>').join('');}

// Wishlist
function toggleWish(name,emoji,price){const idx=wish.findIndex(w=>w.name===name);if(idx>-1){wish.splice(idx,1);toast('Удалено из избранного');}else{wish.push({name,emoji,price});toast('Добавлено в избранное ❤');}localStorage.setItem('wish',JSON.stringify(wish));renderWish();}
function renderWish(){const c=document.getElementById('wishList');if(!c)return;if(!wish.length){c.innerHTML='<div class="ce"><div style="font-size:40px;margin-bottom:12px">♡</div><h3>Пока пусто</h3><p>Добавьте товары в избранное</p></div>';return;}c.innerHTML='<div class="cag">'+wish.map(i=>'<div class="cac"><div class="cai">'+i.emoji+'</div><div class="can">'+i.name+'</div><div class="cap">'+i.price+'</div></div>').join('')+'</div>';}

// Cart
function rCart(){const c=document.getElementById('cC');if(!cart.length){c.innerHTML='<div class="ce"><div style="font-size:40px;margin-bottom:12px">🛒</div><h3>Корзина пуста</h3></div>';return;}let h='<div style="padding:0 14px">',t=0;cart.forEach((i,x)=>{t+=i.p*i.q;h+='<div style="display:flex;gap:12px;padding:12px;margin-bottom:8px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)"><div style="font-size:24px">'+i.e+'</div><div style="flex:1"><div style="font-weight:700">'+i.n+'</div><div style="font-size:12px;color:rgba(255,255,255,.4)">'+i.c+'</div><div style="color:var(--b2);font-weight:800">'+(i.p*i.q).toLocaleString()+' ₽</div></div></div>';});h+='</div><div style="margin:16px;padding:16px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>Итого</span><span style="font-size:16px;font-weight:800;color:var(--b2)">'+t.toLocaleString()+' ₽</span></div></div>';c.innerHTML=h;}

// Init
rP();rC();
</script></body></html>
